events {
    worker_connections 1024;
}

http {
    # ── MIME types ────────────────────────────────────────────
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # ── Security headers ─────────────────────────────────────
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;

    # ── Gzip ─────────────────────────────────────────────────
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml text/javascript image/svg+xml;

    # ── Upload size ──────────────────────────────────────────
    client_max_body_size 15M;

    # ── Rate limiting zones ──────────────────────────────────
    limit_req_zone $binary_remote_addr zone=api_general:10m rate=30r/s;
    limit_req_zone $binary_remote_addr zone=api_auth:10m    rate=1r/s;
    limit_req_zone $binary_remote_addr zone=api_public:10m  rate=10r/s;

    # ── Upstream servers ─────────────────────────────────────
    upstream backend {
        server backend:4000;
    }

    upstream frontend {
        server frontend:3000;
    }

    # ── HTTP → HTTPS redirect (main + subdomains) ─────────────
    server {
        listen 80;
        server_name tecnikos.com.br www.tecnikos.com.br *.tecnikos.com.br;

        # Zoho Mail domain verification
        location /zohoverify/verifyforzoho.html {
            default_type text/html;
            return 200 '34977772';
        }

        # Let's Encrypt ACME challenge
        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        location / {
            return 301 https://$host$request_uri;
        }
    }

    # ── Redirect www → non-www ───────────────────────────────
    server {
        listen 443 ssl;
        server_name www.tecnikos.com.br;

        ssl_certificate     /etc/nginx/ssl/fullchain.pem;
        ssl_certificate_key /etc/nginx/ssl/privkey.pem;

        return 301 https://tecnikos.com.br$request_uri;
    }

    # ── HTTPS server (principal + subdomains) ──────────────────
    server {
        listen 443 ssl;
        http2 on;
        server_name tecnikos.com.br *.tecnikos.com.br;

        # SSL certificates
        ssl_certificate     /etc/nginx/ssl/fullchain.pem;
        ssl_certificate_key /etc/nginx/ssl/privkey.pem;

        # SSL settings
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers HIGH:!aNULL:!MD5;
        ssl_prefer_server_ciphers on;
        ssl_session_cache shared:SSL:10m;
        ssl_session_timeout 10m;

        # HSTS
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;

        # ── Block vulnerability scanners & sensitive files ───
        location ~ /\.(env|git|svn|htaccess|htpasswd|DS_Store|bak|old|orig|save|swp|sql|log|ini|yml|yaml|toml|conf|cfg|config)$ {
            access_log /var/log/nginx/blocked.log;
            return 444;
        }
        location ~* ^/(\.git|\.svn|\.hg|\.bzr|wp-admin|wp-login|wp-content|wp-includes|phpmyadmin|pma|myadmin|adminer|cgi-bin|\.well-known/security\.txt) {
            access_log /var/log/nginx/blocked.log;
            return 444;
        }
        location ~* \.(php|asp|aspx|jsp|cgi|pl)$ {
            access_log /var/log/nginx/blocked.log;
            return 444;
        }

        # ── Block suspicious user agents ─────────────────────
        if ($http_user_agent ~* (nmap|nikto|sqlmap|dirbuster|masscan|zgrab|censys|shodan|nuclei)) {
            return 444;
        }

        # ── API Backend ──────────────────────────────────────
        location /api/ {
            limit_req zone=api_general burst=50 nodelay;
            rewrite ^/api/(.*) /$1 break;
            proxy_pass http://backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-Host $host;
            proxy_read_timeout 300s;
            proxy_connect_timeout 60s;
            proxy_send_timeout 300s;
        }

        # ── Auth endpoints (rate limit restrito) ─────────────
        location /api/auth/ {
            limit_req zone=api_auth burst=5 nodelay;
            rewrite ^/api/(.*) /$1 break;
            proxy_pass http://backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # ── Public endpoints (OTP, avaliacao) ────────────────
        location /api/p/ {
            limit_req zone=api_public burst=10 nodelay;
            rewrite ^/api/(.*) /$1 break;
            proxy_pass http://backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # ── Uploads (arquivos estaticos) ─────────────────────
        location /uploads/ {
            alias /app/uploads/;
            expires 7d;
            add_header Cache-Control "public, immutable";
        }

        # ── Zoho Mail domain verification ────────────────────
        location /zohoverify/verifyforzoho.html {
            default_type text/html;
            return 200 '34977772';
        }

        # ── Health check ─────────────────────────────────────
        location /health {
            proxy_pass http://backend;
            access_log off;
        }

        # ── Frontend (catch-all) ─────────────────────────────
        location / {
            proxy_pass http://frontend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-Host $host;
        }
    }
}
