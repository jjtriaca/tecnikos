services:
  postgres:
    image: postgres:16
    container_name: sistema_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-sistema}
      POSTGRES_USER: ${POSTGRES_USER:-sistema_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-sistema_pass}
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
